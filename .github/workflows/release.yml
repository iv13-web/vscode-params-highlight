name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Verify package.json version matches tag
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) does not match tag ($TAG)"
            exit 1
          fi

      - run: npm run check-types

      - run: npm run build

      - name: Package vsix
        run: npx @vscode/vsce package -o extension.vsix

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        run: npx @vscode/vsce publish --packagePath extension.vsix -p "$VSCE_PAT"

      - name: Skip Marketplace (no VSCE_PAT)
        if: env.VSCE_PAT == ''
        run: echo "::notice::VSCE_PAT secret is not set. Skipping VS Code Marketplace publish. Upload extension.vsix manually at https://marketplace.visualstudio.com/manage/publishers/iv13-web."

      - name: Publish to Open VSX Registry
        if: env.OVSX_PAT != ''
        run: npx ovsx publish extension.vsix -p "$OVSX_PAT"

      - name: Skip Open VSX (no OVSX_PAT)
        if: env.OVSX_PAT == ''
        run: echo "::notice::OVSX_PAT secret is not set. Skipping Open VSX publish."

      - name: Attach vsix to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.vsix
          generate_release_notes: true
